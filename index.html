<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Central Inteligente</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Open+Sans:wght@400&display=swap');
    :root{
      --yellow:#f5c400;
      --yellow-soft:#fff8d1;
      --text:#111;
      --muted:#6b7280;
      --border:#e5e7eb;
      --soft:#f8f9fa;
      --green:#137333;
      --red:#b3261e;
      --chat-bg:#fafafa;
      --shadow:0 12px 32px rgba(0,0,0,.10);
      --drawer-width:392px;
    }
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;font-family:'Open Sans',Arial,Helvetica,sans-serif;background:#fff;color:var(--text);font-weight:400;display:flex;flex-direction:column}
    button,input{font-family:inherit}
    .app-header{height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;border-bottom:1px solid #f1f3f4;position:sticky;top:0;z-index:30;background:rgba(255,255,255,.94);backdrop-filter:blur(10px)}
    .brand{font-size:14px;font-weight:400}
    .header-actions{display:flex;gap:10px;align-items:center}
    .pill-btn{border:1px solid var(--border);background:#fff;border-radius:999px;padding:9px 15px;font-weight:400;cursor:pointer;transition:.16s}
    .pill-btn:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(0,0,0,.08)}
    .pill-btn.yellow{background:var(--yellow);border-color:var(--yellow);color:#000}
    .home{max-width:980px;width:100%;margin:0 auto;padding:54px 24px 36px;display:flex;flex-direction:column;align-items:center;flex:1}
    .logo{width:min(460px,82vw);height:auto;max-height:130px;object-fit:contain;margin-bottom:24px}
    .search-box{width:100%;max-width:900px;min-height:62px;border:1px solid var(--border);border-radius:999px;display:flex;align-items:center;gap:14px;padding:0 18px;transition:.18s;background:#fff}
    .search-box:hover,.search-box:focus-within{border-color:transparent;box-shadow:0 2px 10px rgba(32,33,36,.16);transform:translateY(-1px)}
    .search-box input{flex:1;border:0;outline:0;font-size:20px;padding:17px 4px;background:transparent;color:#202124}
    .icon{width:22px;height:22px;color:#9aa0a6;flex:0 0 auto}
    .voice-btn,.send-round{border:0;background:transparent;width:38px;height:38px;border-radius:999px;display:grid;place-items:center;cursor:pointer;transition:.16s}
    .voice-btn:hover,.send-round:hover{background:#f1f3f4;transform:scale(1.05)}
    .voice-btn.recording{background:#fff1f0;color:var(--red)}
    .voice-btn.hidden{display:none}
    .section-label{font-size:13px;color:var(--muted);font-weight:400;margin:24px 0 10px;text-align:center;letter-spacing:.01em}
    .suggestions-toggle{
      border:1px solid var(--border);
      background:#fff;
      border-radius:999px;
      padding:10px 16px;
      cursor:pointer;
      color:#3c4043;
      font-size:14px;
      font-weight:400;
      display:inline-flex;
      align-items:center;
      gap:8px;
      margin:0 0 22px;
      transition:.16s;
    }
    .suggestions-toggle:hover{transform:translateY(-1px);box-shadow:0 6px 14px rgba(0,0,0,.10)}
    .suggestions-toggle.active{background:var(--yellow-soft);border-color:var(--yellow)}
    .suggestions-toggle svg{width:18px;height:18px;color:#9aa0a6}
    .suggestions{display:none}
    .suggestions.open{display:flex}
    .suggestions{justify-content:center;flex-wrap:wrap;gap:10px;width:100%;margin:34px 0 26px}
    .chip{border:1px solid var(--border);background:#fff;border-radius:999px;padding:10px 14px;cursor:pointer;color:#3c4043;font-size:14px;transition:.16s}
    .chip:hover{transform:translateY(-2px);box-shadow:0 6px 14px rgba(0,0,0,.10);border-color:#c9ccd1}.chip.selected{background:#FFF3C4;border-color:var(--yellow);box-shadow:0 4px 14px rgba(245,196,0,.18)}
    .divider{display:none;width:100%;max-width:760px;height:1px;background:#f1f3f4;margin:8px 0 0}.divider.show{display:block}
    .mode-group{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
    .mode{border:1px solid var(--border);background:var(--soft);border-radius:999px;padding:10px 18px;font-size:14px;font-weight:400;cursor:pointer;min-width:126px;transition:.16s;display:inline-flex;align-items:center;justify-content:center;gap:8px;color:#111}
    .mode.active{background:var(--yellow-soft);border-color:var(--yellow);box-shadow:0 4px 14px rgba(245,196,0,.22)}
    .mode:hover{transform:translateY(-1px)}
    .actions{display:flex;gap:14px;justify-content:center;margin-top:22px;flex-wrap:wrap}
    .btn{border:0;border-radius:999px;padding:13px 26px;font-size:15px;font-weight:400;cursor:pointer;min-width:160px;background:var(--soft);color:#111;transition:.16s;box-shadow:0 1px 2px rgba(0,0,0,.08);display:inline-flex;align-items:center;justify-content:center;gap:8px}.btn-icon{width:18px;height:18px;color:#111;flex:0 0 auto}
    .btn.primary{background:var(--yellow);color:#000}
    .btn:hover{transform:translateY(-2px);box-shadow:0 8px 18px rgba(0,0,0,.12)}.btn:active,.mode:active,.chip:active,.suggestions-toggle:active{transform:scale(.98)}
    .status{min-height:20px;font-size:14px;color:var(--muted);text-align:center;margin-top:16px}
    .status.success{color:var(--green)}
    .status.error{color:var(--red)}
    .chat{display:none;min-height:calc(100vh - 54px);background:var(--chat-bg);position:relative;flex:1}
    .chat.active{display:grid;grid-template-rows:1fr auto}
    .chat-top{position:absolute;top:14px;left:20px;right:20px;display:flex;justify-content:space-between;gap:12px;pointer-events:none;z-index:10}
    .chat-top .pill-btn{pointer-events:auto;background:#fff}
    .messages{padding:76px 24px 24px;overflow:auto;display:flex;flex-direction:column;gap:18px;max-width:980px;width:100%;margin:0 auto}
    .bubble-row{display:flex;width:100%}
    .bubble-row.user{justify-content:flex-end}
    .bubble-row.assistant{justify-content:flex-start}
    .bubble{max-width:min(760px,90%);border:1px solid var(--border);border-radius:22px;padding:16px 18px;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.04);line-height:1.6;font-size:15px;word-break:break-word;overflow-x:auto}
    .bubble-row.user .bubble{background:#FFF3C4;border-color:#FFE08A;border-bottom-right-radius:6px;font-weight:400}
    .bubble-row.assistant .bubble{border-bottom-left-radius:6px}
    .mode-tag{display:inline-flex;align-items:center;gap:6px;margin:0 0 12px 0;border:1px solid var(--border);border-radius:999px;padding:5px 10px;color:var(--muted);font-size:12px;font-weight:400;background:#fff}
    .thinking-wrap{
      display:inline-flex;
      align-items:center;
      gap:10px;
      color:#374151;
      font-weight:400;
    }
    .typing-dots{
      display:inline-flex;
      align-items:center;
      gap:4px;
    }
    .typing-dots span{
      width:7px;
      height:7px;
      border-radius:999px;
      background:#9ca3af;
      display:block;
      animation:typingBounce 1.1s infinite ease-in-out;
    }
    .typing-dots span:nth-child(2){animation-delay:.16s}
    .typing-dots span:nth-child(3){animation-delay:.32s}
    @keyframes typingBounce{
      0%,80%,100%{transform:translateY(0);opacity:.45}
      40%{transform:translateY(-5px);opacity:1}
    }

    .bubble table{width:100%;border-collapse:collapse;margin-top:8px;font-size:14px;white-space:normal}
    .bubble th,.bubble td{border-bottom:1px solid var(--border);padding:9px 8px;text-align:left}
    .bubble th{background:#fafafa;font-weight:400}
    .chat-input-area{border-top:1px solid var(--border);background:#fff;padding:14px 20px 18px}
    .chat-input-wrap{max-width:760px;margin:0 auto;display:grid;gap:10px}
    .chat-modes{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
    .chat-modes .mode{min-width:100px;padding:8px 14px;font-size:13px}
    .chat-input{display:flex;align-items:center;gap:10px;border:1px solid var(--border);border-radius:999px;padding:6px 8px 6px 16px;background:#fff}
    .chat-input input{border:0;outline:0;flex:1;font-size:15px;padding:10px 4px;background:transparent}
    .send-round{background:var(--yellow);color:#000;font-weight:400}
    .drawer{position:fixed;top:0;right:calc(-1 * var(--drawer-width));width:var(--drawer-width);max-width:100vw;height:100%;background:#fff;border-left:1px solid var(--border);transition:.25s;padding:18px;z-index:50;overflow:auto;box-shadow:-10px 0 30px rgba(0,0,0,.08);display:flex;flex-direction:column}
    .drawer.open{right:0}
    .drawer-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
    .drawer-title{font-size:16px;font-weight:400}
    .close-btn{border:1px solid var(--border);background:#fff;border-radius:999px;width:34px;height:34px;cursor:pointer;font-weight:400}
    .history-body{flex:1}
    .history-empty{min-height:70vh;color:var(--muted);border:1px dashed var(--border);border-radius:18px;padding:28px 18px;text-align:center;font-size:14px;display:flex;align-items:center;justify-content:center;line-height:1.5}
    .history-item{border:1px solid var(--border);border-radius:16px;padding:13px;margin-bottom:10px;cursor:pointer;transition:.16s;background:#fff}
    .history-item:hover{background:#fafafa;transform:translateY(-1px)}
    .history-question{font-weight:400;font-size:14px;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .history-meta{color:var(--muted);font-size:12px}
    .danger-btn{width:100%;margin-top:16px;border:1px solid #f2c7c3;background:#fff;color:var(--red);border-radius:999px;padding:11px;font-weight:400;cursor:pointer}
    .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.25);display:none;align-items:center;justify-content:center;z-index:80;padding:20px}
    .modal-backdrop.open{display:flex}
    .modal{width:min(420px,100%);background:#fff;border-radius:22px;padding:22px;box-shadow:var(--shadow)}
    .modal h3{margin:0 0 8px}
    .modal p{color:var(--muted);line-height:1.5}
    .modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:18px}
    .footer{padding:18px 24px;text-align:center;font-size:13px;color:var(--muted);border-top:1px solid #f1f3f4;margin-top:auto;background:#fff}
    @media print{.app-header,.chat-top,.chat-input-area,.drawer,.modal-backdrop,.footer,.home{display:none!important}.chat{display:block!important;height:auto!important;background:#fff!important}.messages{padding:20px!important;overflow:visible!important}.bubble{box-shadow:none!important;max-width:100%!important;page-break-inside:avoid}}
    @media(max-width:760px){
      .app-header{height:54px;padding:0 14px}.home{padding:36px 14px 26px}.logo{width:min(310px,84vw);max-height:92px;margin-bottom:28px}
      .search-box{min-height:56px;border-radius:30px;padding:0 14px;gap:10px}.search-box input{font-size:16px}
      .suggestions{width:calc(100vw - 28px);justify-content:flex-start;flex-wrap:nowrap;overflow-x:auto;padding-bottom:8px;margin-top:26px;margin-bottom:22px;-webkit-overflow-scrolling:touch}.suggestions::-webkit-scrollbar{display:none}.chip{flex:0 0 auto;max-width:82vw;white-space:nowrap;font-size:13px}
      .mode-group{width:100%;display:grid;grid-template-columns:1fr}.mode{width:100%}.actions{width:100%;display:grid;grid-template-columns:1fr}.btn{width:100%}
      .chat{height:calc(100dvh - 54px)}.chat-top{top:10px;left:12px;right:12px}.messages{padding:72px 14px 18px}.bubble{max-width:94%;font-size:14px}.chat-input-area{padding:10px 12px 14px}.chat-modes{display:grid;grid-template-columns:1fr}.drawer{width:100%;right:-100%}
    }
  
/* V22 - Ajustes mínimos a partir da V15 */
.chat-top{
  position:fixed !important;
  top:calc(100vh - 170px) !important;
  left:0 !important;
  right:0 !important;
  width:100% !important;
  display:flex !important;
  justify-content:space-between !important;
  align-items:center !important;
  padding:0 24px !important;
  background:transparent !important;
  pointer-events:none !important;
  z-index:40 !important;
}

.chat-top .pill-btn,
#newQueryBtn,
#printBtn{
  pointer-events:auto !important;
  display:inline-flex !important;
  align-items:center !important;
  justify-content:center !important;
  width:auto !important;
  height:46px !important;
  min-width:0 !important;
  min-height:0 !important;
  max-height:46px !important;
  padding:0 18px !important;
  margin:0 !important;
  border-radius:999px !important;
  white-space:nowrap !important;
  flex:0 0 auto !important;
  line-height:1 !important;
  writing-mode:horizontal-tb !important;
  text-orientation:mixed !important;
}

#printBtn{
  border-color:var(--yellow) !important;
}

.history-item-top{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:10px;
}

.history-main{
  min-width:0;
  flex:1;
}

.history-actions{
  display:flex;
  gap:6px;
  flex:0 0 auto;
}

.history-action-btn{
  width:30px;
  height:30px;
  border:1px solid var(--border);
  background:#fff;
  border-radius:999px;
  display:grid;
  place-items:center;
  cursor:pointer;
  color:#111;
  transition:.16s;
}

.history-action-btn:hover{
  transform:translateY(-1px);
  box-shadow:0 4px 10px rgba(0,0,0,.08);
}

.history-action-btn.delete{
  color:var(--red);
  border-color:#f2c7c3;
}

.history-action-btn svg{
  width:15px;
  height:15px;
}

@media(max-width:760px){
  .chat-top{
    top:calc(100dvh - 165px) !important;
    padding:0 12px !important;
  }

  .chat-top .pill-btn,
  #newQueryBtn,
  #printBtn{
    height:40px !important;
    max-height:40px !important;
    padding:0 13px !important;
    font-size:13px !important;
  }

  .history-action-btn{
    width:28px;
    height:28px;
  }
}

</style>
</head>
<body>
  <header class="app-header">
    <div class="brand">Central de Inteligência de Dados</div>
    <div class="header-actions"><button class="pill-btn" id="historyBtn">Histórico</button></div>
  </header>

  <main class="home" id="home">
    <img class="logo" src="solidaridad-logo.png" alt="Solidaridad" />
    <button class="suggestions-toggle" id="suggestionsToggle" type="button">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M12 3l1.8 4.2L18 9l-4.2 1.8L12 15l-1.8-4.2L6 9l4.2-1.8L12 3Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
        <path d="M19 14l.9 2.1L22 17l-2.1.9L19 20l-.9-2.1L16 17l2.1-.9L19 14Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
      </svg>
      Sugestões de perguntas
    </button>
    <div class="search-box">
      <svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M10.8 18.1a7.3 7.3 0 1 1 0-14.6 7.3 7.3 0 0 1 0 14.6Z" stroke="currentColor" stroke-width="2"/><path d="m16.2 16.2 4.3 4.3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      <input id="homeQuestion" placeholder="Faça aqui sua consulta de dados" autocomplete="off" />
      <button class="voice-btn" id="homeVoiceBtn" title="Falar pergunta"><svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 14a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v5a3 3 0 0 0 3 3Z" stroke="currentColor" stroke-width="2"/><path d="M19 11a7 7 0 0 1-14 0M12 18v3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
    </div>

    <div class="suggestions" id="suggestions">
      <button class="chip">Quantos produtores ativos existem?</button>
      <button class="chip">Quantas propriedades ativas existem?</button>
      <button class="chip">Qual o percentual de mulheres entre produtores ativos?</button>
      <button class="chip">Qual a idade média dos produtores ativos?</button>
      <button class="chip">Qual o volume total produzido por commodity?</button>
      <button class="chip">Quais os 10 projetos com mais produtores?</button>
    </div>

    <div class="divider" id="suggestionsDivider"></div>
    <div class="section-label">Quero ver a resposta em forma de:</div>
    <div class="mode-group" id="homeModes">
      <button class="mode active" data-mode="resposta"><svg class="btn-icon" viewBox="0 0 24 24" fill="none"><path d="M5 6h14M5 12h14M5 18h9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>Texto</button>
      <button class="mode" data-mode="tabela"><svg class="btn-icon" viewBox="0 0 24 24" fill="none"><path d="M4 5h16v14H4zM4 10h16M10 5v14" stroke="currentColor" stroke-width="2"/></svg>Tabela</button>
      <button class="mode" data-mode="infografico"><svg class="btn-icon" viewBox="0 0 24 24" fill="none"><path d="M4 19V5M4 19h16M8 15l3-3 3 2 5-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>Infográfico</button>
    </div>

    <div class="actions">
      <button class="btn primary" id="homeSendBtn"><svg class="btn-icon" viewBox="0 0 24 24" fill="none"><path d="M10.8 18.1a7.3 7.3 0 1 1 0-14.6 7.3 7.3 0 0 1 0 14.6Z" stroke="currentColor" stroke-width="2"/><path d="m16.2 16.2 4.3 4.3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>Consultar dados</button>
      <button class="btn" id="homeClearBtn"><svg class="btn-icon" viewBox="0 0 24 24" fill="none"><path d="M6 7h12M9 7V5h6v2M9 11v6M15 11v6M7 7l1 13h8l1-13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>Limpar</button>
    </div>
    <div class="status" id="homeStatus"></div>
  </main>

  <section class="chat" id="chat">
    <div class="chat-top">
      <button class="pill-btn" id="newQueryBtn">← Nova consulta</button>
      <button class="pill-btn yellow" id="printBtn">Imprimir / PDF</button>
    </div>
    <div class="messages" id="messages"></div>
    <div class="chat-input-area">
      <div class="chat-input-wrap">
        <div class="chat-modes" id="chatModes">
          <button class="mode active" data-mode="resposta">Texto</button>
          <button class="mode" data-mode="tabela">Tabela</button>
          <button class="mode" data-mode="infografico">Infográfico</button>
        </div>
        <div class="chat-input">
          <input id="chatQuestion" placeholder="Continue perguntando..." autocomplete="off" />
          <button class="voice-btn" id="chatVoiceBtn" title="Falar pergunta"><svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 14a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v5a3 3 0 0 0 3 3Z" stroke="currentColor" stroke-width="2"/><path d="M19 11a7 7 0 0 1-14 0M12 18v3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
          <button class="send-round" id="chatSendBtn" title="Enviar"><svg class="btn-icon" viewBox="0 0 24 24" fill="none"><path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
        </div>
      </div>
    </div>
  </section>

  <aside class="drawer" id="drawer">
    <div class="drawer-header">
      <div class="drawer-title">Histórico de consultas</div>
      <button class="close-btn" id="closeHistoryBtn">×</button>
    </div>
    <div class="history-body" id="historyList"></div>
    <button class="danger-btn" id="clearHistoryBtn">Limpar todo o histórico</button>
  </aside>

  <div class="modal-backdrop" id="confirmModal">
    <div class="modal">
      <h3>Apagar histórico?</h3>
      <p>Esta ação removerá todas as conversas salvas neste navegador.</p>
      <div class="modal-actions">
        <button class="pill-btn" id="cancelClearBtn">Cancelar</button>
        <button class="pill-btn" id="confirmClearBtn" style="border-color:#f2c7c3;color:#b3261e">Confirmar</button>
      </div>
    </div>
  </div>

  <footer class="footer">Central de Inteligência de Dados - Unidade Digital Fundação Solidaridad</footer>

  <script>
    const WEBHOOK_URL='https://joaogoncalves.app.n8n.cloud/webhook/pergunta'
    const HISTORY_KEY='central_inteligente_conversas_v10'
    const home=document.getElementById('home'),chat=document.getElementById('chat'),messages=document.getElementById('messages'),homeQuestion=document.getElementById('homeQuestion'),chatQuestion=document.getElementById('chatQuestion'),homeStatus=document.getElementById('homeStatus'),drawer=document.getElementById('drawer'),historyList=document.getElementById('historyList'),confirmModal=document.getElementById('confirmModal')
    let mode='resposta',currentConversation=null

    function setMode(m){mode=m;document.querySelectorAll('.mode').forEach(b=>b.classList.toggle('active',b.dataset.mode===m))}
    function escapeHtml(t){return String(t).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'","&#039;")}
    function looksLikeHtml(t){return /<\s*(table|div|section|article|h1|h2|h3|p|ul|ol|li|span|strong|style)\b/i.test(t)}
    function getHistory(){try{return JSON.parse(localStorage.getItem(HISTORY_KEY))||[]}catch(_){return[]}}
    function saveConversation(){if(!currentConversation)return;const h=getHistory(),i=h.findIndex(x=>x.id===currentConversation.id);if(i>=0)h[i]=currentConversation;else h.unshift(currentConversation);localStorage.setItem(HISTORY_KEY,JSON.stringify(h.slice(0,30)));renderHistory()}
    function renderHistory(){
      const h=getHistory()
      if(!h.length){
        historyList.innerHTML='<div class="history-empty">Nenhuma consulta realizada ainda.<br><br>As conversas aparecerão aqui depois da primeira consulta.</div>'
        return
      }

      historyList.innerHTML=h.map(c=>{
        const first=c.messages?.find(m=>m.role==='user')?.content||'Conversa sem título'
        const title=c.title||first
        const total=c.messages?.filter(m=>m.role==='user').length||0

        return `<div class="history-item" data-id="${c.id}">
          <div class="history-item-top">
            <div class="history-main">
              <div class="history-question">${escapeHtml(title)}</div>
              <div class="history-meta">${total} pergunta(s) • ${escapeHtml(c.updatedAt||'')}</div>
            </div>
            <div class="history-actions">
              <button class="history-action-btn rename" title="Renomear conversa" data-id="${c.id}">
                <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M4 20h4l10.5-10.5a2.1 2.1 0 0 0-3-3L5 17v3Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                  <path d="M13.5 8.5l3 3" stroke="currentColor" stroke-width="2"/>
                </svg>
              </button>
              <button class="history-action-btn delete" title="Excluir conversa" data-id="${c.id}">
                <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M6 7h12M9 7V5h6v2M9 11v6M15 11v6M7 7l1 13h8l1-13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </button>
            </div>
          </div>
        </div>`
      }).join('')

      document.querySelectorAll('.history-item').forEach(item=>item.addEventListener('click',e=>{
        if(e.target.closest('.history-action-btn')) return
        const c=getHistory().find(x=>x.id===item.dataset.id)
        if(c){
          openConversation(c)
          drawer.classList.remove('open')
        }
      }))

      document.querySelectorAll('.history-action-btn.rename').forEach(btn=>btn.addEventListener('click',e=>{
        e.stopPropagation()
        const id=btn.dataset.id
        const history=getHistory()
        const conv=history.find(c=>c.id===id)
        if(!conv) return

        const first=conv.messages?.find(m=>m.role==='user')?.content||'Conversa sem título'
        const novoNome=prompt('Renomear conversa:', conv.title||first)

        if(!novoNome || !novoNome.trim()) return

        conv.title=novoNome.trim()
        localStorage.setItem(HISTORY_KEY,JSON.stringify(history))

        if(currentConversation?.id===id) currentConversation=conv

        renderHistory()
      }))

      document.querySelectorAll('.history-action-btn.delete').forEach(btn=>btn.addEventListener('click',e=>{
        e.stopPropagation()
        const id=btn.dataset.id

        if(!confirm('Excluir esta conversa do histórico?')) return

        const history=getHistory().filter(c=>c.id!==id)
        localStorage.setItem(HISTORY_KEY,JSON.stringify(history))

        if(currentConversation?.id===id){
          currentConversation=null
          messages.innerHTML=''
          chat.classList.remove('active')
          home.style.display='flex'
        }

        renderHistory()
      }))
    }

    function addMessage(role,content,outputMode=null,loading=false){
      const row=document.createElement('div');row.className=`bubble-row ${role}`
      const bubble=document.createElement('div');bubble.className='bubble'

      if(loading){
        bubble.innerHTML='<div class="thinking-wrap"><span>Pensando</span><span class="typing-dots"><span></span><span></span><span></span></span></div>'
      }else{
        if(role==='assistant'&&outputMode){
          const tag=document.createElement('div')
          tag.className='mode-tag'
          tag.textContent=outputMode==='resposta'?'Resposta em modo: Texto':outputMode==='tabela'?'Resposta em modo: Tabela':'Resposta em modo: Infográfico'
          bubble.appendChild(tag)
        }

        const contentBox=document.createElement('div')
        if(role==='assistant'&&looksLikeHtml(content))contentBox.innerHTML=content
        else contentBox.textContent=content
        bubble.appendChild(contentBox)
      }

      row.appendChild(bubble);messages.appendChild(row);messages.scrollTop=messages.scrollHeight;return row
    }
    function startChat(){home.style.display='none';chat.classList.add('active')}
    function openConversation(c){currentConversation=c;startChat();messages.innerHTML='';c.messages.forEach(m=>addMessage(m.role,m.content,m.mode))}
    function newConversation(){currentConversation={id:String(Date.now()),createdAt:new Date().toLocaleString('pt-BR'),updatedAt:new Date().toLocaleString('pt-BR'),messages:[]}}
    async function ask(pergunta){
      if(!pergunta.trim())return
      if(!currentConversation)newConversation()
      startChat()
      currentConversation.messages.push({role:'user',content:pergunta,mode})
      addMessage('user',pergunta)
      const loadingRow=addMessage('assistant','Pensando...',mode,true)
      try{
        const r=await fetch(WEBHOOK_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pergunta,tipo_saida:mode})})
        const t=await r.text()
        if(!r.ok)throw new Error(t||`Erro ${r.status}`)
        if(!t || !t.trim()) throw new Error('sem_resposta')
        loadingRow.remove();addMessage('assistant',t,mode)
        currentConversation.messages.push({role:'assistant',content:t,mode})
        currentConversation.updatedAt=new Date().toLocaleString('pt-BR')
        saveConversation()
        homeStatus.textContent=''
      }catch(e){
        loadingRow.remove();addMessage('assistant','Desculpe, não consegui encontrar uma boa resposta para sua pergunta. Gostaria de perguntar de outra forma?','resposta')
      }
    }
    function attachVoice(button,input){
      const SR=window.SpeechRecognition||window.webkitSpeechRecognition
      if(!SR){button.classList.add('hidden');return}
      const rec=new SR();rec.lang='pt-BR';rec.interimResults=false;rec.maxAlternatives=1
      button.addEventListener('click',()=>{button.classList.add('recording');rec.start()})
      rec.onresult=e=>input.value=e.results[0][0].transcript
      rec.onend=()=>button.classList.remove('recording')
    }
    document.querySelectorAll('.mode').forEach(b=>b.addEventListener('click',()=>setMode(b.dataset.mode)))
    document.getElementById('suggestions').addEventListener('click',e=>{const chip=e.target.closest('.chip');if(chip){document.querySelectorAll('.chip').forEach(c=>c.classList.remove('selected'));chip.classList.add('selected');homeQuestion.value=chip.textContent.trim();homeQuestion.focus()}})

    document.getElementById('suggestionsToggle').addEventListener('click',()=>{
      const suggestions=document.getElementById('suggestions')
      const toggle=document.getElementById('suggestionsToggle')
      const divider=document.getElementById('suggestionsDivider')
      suggestions.classList.toggle('open')
      toggle.classList.toggle('active')
      divider.classList.toggle('show', suggestions.classList.contains('open'))
    })

    document.getElementById('homeSendBtn').addEventListener('click',()=>ask(homeQuestion.value.trim()))
    document.getElementById('chatSendBtn').addEventListener('click',()=>{const p=chatQuestion.value.trim();chatQuestion.value='';ask(p)})
    homeQuestion.addEventListener('keydown',e=>{if(e.key==='Enter')ask(homeQuestion.value.trim())})
    chatQuestion.addEventListener('keydown',e=>{if(e.key==='Enter'){const p=chatQuestion.value.trim();chatQuestion.value='';ask(p)}})
    document.getElementById('homeClearBtn').addEventListener('click',()=>{homeQuestion.value='';homeStatus.textContent='';document.querySelectorAll('.chip').forEach(c=>c.classList.remove('selected'));homeQuestion.focus()})
    document.getElementById('newQueryBtn').addEventListener('click',()=>{currentConversation=null;messages.innerHTML='';chat.classList.remove('active');home.style.display='flex';homeQuestion.value='';homeQuestion.focus()})
    document.getElementById('printBtn').addEventListener('click',()=>window.print())
    document.getElementById('historyBtn').addEventListener('click',()=>{renderHistory();drawer.classList.add('open')})
    document.getElementById('closeHistoryBtn').addEventListener('click',()=>drawer.classList.remove('open'))
    document.getElementById('clearHistoryBtn').addEventListener('click',()=>confirmModal.classList.add('open'))
    document.getElementById('cancelClearBtn').addEventListener('click',()=>confirmModal.classList.remove('open'))
    document.getElementById('confirmClearBtn').addEventListener('click',()=>{localStorage.removeItem(HISTORY_KEY);confirmModal.classList.remove('open');renderHistory()})
    attachVoice(document.getElementById('homeVoiceBtn'),homeQuestion)
    attachVoice(document.getElementById('chatVoiceBtn'),chatQuestion)
    renderHistory()
  </script>
</body>
</html>
